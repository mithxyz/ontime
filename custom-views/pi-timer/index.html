<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1424, initial-scale=1, user-scalable=no" />
<title>ontime — pi-timer</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --panel: #0f0f0f;
    --accent: #ffffff;
    --warning: #f2a935;
    --danger: #e6392b;
    --overtime: #e6392b;
    --paused: #6b6b6b;
    --stopped: #3a3a3a;
    --progress-bg: #1a1a1a;
    --progress-fill: #ffffff;
    --label: #8a8a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1424px; height: 280px;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Roboto Mono', 'DejaVu Sans Mono', 'Liberation Mono', 'Consolas', monospace;
    -webkit-font-smoothing: antialiased;
    font-smooth: never;
  }
  body {
    display: grid;
    grid-template-rows: 1fr 20px;
    padding: 8px;
  }

  #timer-panel {
    background: var(--panel);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  #timer {
    font-size: 240px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -6px;
    color: var(--accent);
  }
  #timer.warning { color: var(--warning); }
  #timer.danger { color: var(--danger); }
  #timer.overtime { color: var(--overtime); }
  #timer.paused { color: var(--paused); }
  #timer.stopped { color: var(--stopped); }
  #timer-state {
    position: absolute;
    top: 10px; right: 14px;
    font-size: 18px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  #progress-panel {
    background: var(--progress-bg);
    position: relative;
    overflow: hidden;
  }
  #progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--progress-fill);
  }
  #progress-panel.warning #progress-fill { background: var(--warning); }
  #progress-panel.danger #progress-fill { background: var(--danger); }
  #progress-panel.overtime #progress-fill { background: var(--overtime); width: 100% !important; }

  /* message overlay — stock Timer behaviour */
  #overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
    text-align: center;
  }
  #overlay.visible { display: flex; }
  #overlay.blackout { background: #000; }
  #overlay .msg {
    font-size: 160px;
    font-weight: 700;
    line-height: 1.05;
    color: #fff;
    max-width: 100%;
    word-break: break-word;
  }

  /* connection indicator */
  #conn {
    position: fixed;
    top: 4px; right: 6px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #2ecc71;
    z-index: 20;
  }
  #conn.stale { background: #e6392b; }
</style>
</head>
<body>
  <section id="timer-panel">
    <div id="timer-state"></div>
    <div id="timer">--:--:--</div>
  </section>

  <section id="progress-panel">
    <div id="progress-fill"></div>
  </section>

  <div id="overlay"><div class="msg" id="overlay-msg"></div></div>
  <div id="conn" title="connection"></div>

<script>
(function () {
  'use strict';

  // --- URL params --------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const showProgress = params.get('progress') !== 'false';
  if (!showProgress) document.getElementById('progress-panel').style.display = 'none';

  // --- DOM refs ----------------------------------------------------------
  const el = {
    timer: document.getElementById('timer'),
    timerState: document.getElementById('timer-state'),
    progressPanel: document.getElementById('progress-panel'),
    progressFill: document.getElementById('progress-fill'),
    overlay: document.getElementById('overlay'),
    overlayMsg: document.getElementById('overlay-msg'),
    conn: document.getElementById('conn'),
  };

  // --- state -------------------------------------------------------------
  const state = {
    timer: null,           // { current, duration, phase, playback, elapsed, ...}
    message: null,
    lastPatchAt: 0,
  };

  // --- formatters --------------------------------------------------------
  const HOUR_MS = 3600000;

  function pad2(n) { return Math.floor(n).toString().padStart(2, '0'); }

  function formatTimer(ms, forceHours) {
    if (ms == null || Number.isNaN(ms)) return '--:--';
    const neg = ms < 0;
    const abs = Math.abs(ms);
    const h = Math.floor(abs / HOUR_MS);
    const m = Math.floor((abs % HOUR_MS) / 60000);
    const s = Math.floor((abs % 60000) / 1000);
    const sign = neg ? '-' : '';
    if (forceHours || h > 0) return `${sign}${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    return `${sign}${pad2(m)}:${pad2(s)}`;
  }

  // --- render ------------------------------------------------------------
  function render() {
    const now = Date.now();
    const drift = now - state.lastPatchAt;

    const t = state.timer;
    if (!t) {
      el.timer.textContent = '--:--';
      el.timer.className = 'stopped';
      el.timerState.textContent = '';
      el.progressFill.style.width = '0%';
      el.progressPanel.className = '';
      return;
    }

    // interpolate timer when playing
    let current = t.current;
    if (t.playback === 'play' && current != null) {
      // count-down: subtract drift; count-up: add drift. Phase 'overtime' is still counting down (more negative)
      current = current - drift;
    }

    const forceHours = (t.duration || 0) >= HOUR_MS || Math.abs(current || 0) >= HOUR_MS;
    el.timer.textContent = formatTimer(current, forceHours);

    // phase / playback classes
    let cls = 'default';
    if (t.playback === 'pause') cls = 'paused';
    else if (t.playback === 'stop' || t.playback === 'armed') cls = 'stopped';
    else if (t.phase === 'overtime') cls = 'overtime';
    else if (t.phase === 'danger') cls = 'danger';
    else if (t.phase === 'warning') cls = 'warning';
    el.timer.className = cls;

    const stateLabel = {
      play: '', pause: 'Paused', stop: 'Stopped', armed: 'Armed', roll: 'Roll',
    }[t.playback] || '';
    el.timerState.textContent = stateLabel;

    // progress bar
    if (t.duration && t.duration > 0 && t.phase !== 'overtime') {
      const elapsed = (t.duration - Math.max(current, 0));
      const pct = Math.max(0, Math.min(100, (elapsed / t.duration) * 100));
      el.progressFill.style.width = pct + '%';
    } else if (t.phase === 'overtime') {
      el.progressFill.style.width = '100%';
    } else {
      el.progressFill.style.width = '0%';
    }
    el.progressPanel.className = (t.phase === 'warning' || t.phase === 'danger' || t.phase === 'overtime') ? t.phase : '';
  }

  function renderMessage() {
    const m = state.message && state.message.timer;
    if (!m) { el.overlay.className = ''; return; }
    if (m.blackout) {
      el.overlay.className = 'visible blackout';
      el.overlayMsg.textContent = '';
      return;
    }
    if (m.visible && m.text) {
      el.overlay.className = 'visible';
      el.overlayMsg.textContent = m.text;
      return;
    }
    el.overlay.className = '';
  }

  // --- local tick --------------------------------------------------------
  // keep seconds fresh between WS patches (Pi-friendly: 2 Hz, single DOM write)
  setInterval(render, 500);

  // --- websocket ---------------------------------------------------------
  let ws = null;
  let reconnectTimer = null;
  let staleTimer = null;

  function markFresh() {
    el.conn.classList.remove('stale');
    state.lastPatchAt = Date.now();
    clearTimeout(staleTimer);
    staleTimer = setTimeout(() => el.conn.classList.add('stale'), 5000);
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}/ws`;
    try { ws = new WebSocket(url); } catch (e) { scheduleReconnect(); return; }

    ws.onopen = () => {
      el.conn.classList.remove('stale');
      markFresh();
    };
    ws.onclose = () => { el.conn.classList.add('stale'); scheduleReconnect(); };
    ws.onerror = () => { /* onclose will fire */ };
    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch (e) { return; }
      if (msg && msg.tag === 'runtime-data' && msg.payload) {
        markFresh();
        applyPatch(msg.payload);
      }
    };
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 1500);
  }

  function applyPatch(p) {
    if ('timer' in p) state.timer = p.timer;
    if ('message' in p) state.message = p.message;
    render();
    if ('message' in p) renderMessage();
  }

  // kick things off
  connect();
  // also do an initial REST poll so we render before the first WS frame arrives
  fetch('/api/poll').then(r => r.ok ? r.json() : null).then(j => {
    if (j && j.payload) { markFresh(); applyPatch(j.payload); renderMessage(); }
  }).catch(() => {});
})();
</script>
</body>
</html>
