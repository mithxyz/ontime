<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1424, initial-scale=1, user-scalable=no" />
<title>ontime — pi-timer</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --dim: #6b6b6b;
    --panel: #0f0f0f;
    --accent: #ffffff;
    --warning: #f2a935;
    --danger: #e6392b;
    --overtime: #e6392b;
    --paused: #6b6b6b;
    --stopped: #3a3a3a;
    --progress-bg: #1a1a1a;
    --progress-fill: #ffffff;
    --label: #8a8a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1424px; height: 280px;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Roboto Mono', 'DejaVu Sans Mono', 'Liberation Mono', 'Consolas', monospace;
    -webkit-font-smoothing: antialiased;
    font-smooth: never;
  }
  body {
    display: grid;
    grid-template-rows: 1fr 20px;
    grid-template-columns: 232px 12px 768px 12px 372px;
    grid-template-areas:
      "clock . timer . side"
      "progress progress progress progress progress";
    padding: 8px;
    gap: 0;
  }
  .pad { padding: 8px; }

  #clock-panel {
    grid-area: clock;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 8px 6px;
  }
  #clock-label {
    font-size: 18px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #clock {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  #venue {
    margin-top: 6px;
    font-size: 16px;
    color: var(--label);
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  #timer-panel {
    grid-area: timer;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  #timer {
    font-size: 180px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -4px;
    color: var(--accent);
  }
  #timer.warning { color: var(--warning); }
  #timer.danger { color: var(--danger); }
  #timer.overtime { color: var(--overtime); }
  #timer.paused { color: var(--paused); }
  #timer.stopped { color: var(--stopped); }
  #timer-sub {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 16px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  #timer-state {
    position: absolute;
    top: 10px; right: 14px;
    font-size: 16px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  #side {
    grid-area: side;
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
  }
  .card {
    background: var(--panel);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .card .label {
    font-size: 16px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }
  .card .title {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.05;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .card .meta {
    font-size: 16px;
    color: var(--label);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  #progress-panel {
    grid-area: progress;
    background: var(--progress-bg);
    position: relative;
    overflow: hidden;
  }
  #progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--progress-fill);
  }
  #progress-panel.warning #progress-fill { background: var(--warning); }
  #progress-panel.danger #progress-fill { background: var(--danger); }
  #progress-panel.overtime #progress-fill { background: var(--overtime); width: 100% !important; }

  /* message overlay — stock Timer behaviour */
  #overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
    text-align: center;
  }
  #overlay.visible { display: flex; }
  #overlay.blackout { background: #000; }
  #overlay .msg {
    font-size: 120px;
    font-weight: 700;
    line-height: 1.05;
    color: #fff;
    max-width: 100%;
    word-break: break-word;
  }

  /* connection indicator */
  #conn {
    position: fixed;
    top: 4px; right: 6px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #2ecc71;
    z-index: 20;
  }
  #conn.stale { background: #e6392b; }
</style>
</head>
<body>
  <section id="clock-panel">
    <div id="clock-label">Clock</div>
    <div id="clock">--:--:--</div>
    <div id="venue"></div>
  </section>

  <section id="timer-panel">
    <div id="timer-sub">Elapsed / Remaining</div>
    <div id="timer-state"></div>
    <div id="timer">--:--:--</div>
  </section>

  <section id="side">
    <div class="card" id="now-card">
      <div class="label">Now</div>
      <div class="title" id="now-title">—</div>
      <div class="meta" id="now-meta"></div>
    </div>
    <div class="card" id="next-card">
      <div class="label">Next</div>
      <div class="title" id="next-title">—</div>
      <div class="meta" id="next-meta"></div>
    </div>
  </section>

  <section id="progress-panel">
    <div id="progress-fill"></div>
  </section>

  <div id="overlay"><div class="msg" id="overlay-msg"></div></div>
  <div id="conn" title="connection"></div>

<script>
(function () {
  'use strict';

  // --- URL params --------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const venueName = params.get('name') || '';
  const showClock = params.get('clock') !== 'false';
  const showProgress = params.get('progress') !== 'false';
  const hideNext = params.get('next') === 'false';
  document.getElementById('venue').textContent = venueName;
  if (!showClock) document.getElementById('clock-panel').style.display = 'none';
  if (!showProgress) document.getElementById('progress-panel').style.display = 'none';

  // --- DOM refs ----------------------------------------------------------
  const el = {
    clock: document.getElementById('clock'),
    timer: document.getElementById('timer'),
    timerSub: document.getElementById('timer-sub'),
    timerState: document.getElementById('timer-state'),
    nowTitle: document.getElementById('now-title'),
    nowMeta: document.getElementById('now-meta'),
    nextTitle: document.getElementById('next-title'),
    nextMeta: document.getElementById('next-meta'),
    progressPanel: document.getElementById('progress-panel'),
    progressFill: document.getElementById('progress-fill'),
    overlay: document.getElementById('overlay'),
    overlayMsg: document.getElementById('overlay-msg'),
    conn: document.getElementById('conn'),
    nextCard: document.getElementById('next-card'),
  };
  if (hideNext) el.nextCard.style.display = 'none';

  // --- state -------------------------------------------------------------
  const state = {
    clock: null,           // ms since midnight
    timer: null,           // { current, duration, phase, playback, elapsed, ...}
    message: null,
    eventNow: null,
    eventNext: null,
    lastPatchAt: 0,
  };

  // --- formatters --------------------------------------------------------
  const HOUR_MS = 3600000;

  function pad2(n) { return Math.floor(n).toString().padStart(2, '0'); }

  function formatClock(ms) {
    if (ms == null) return '--:--:--';
    const abs = Math.abs(ms) % (24 * HOUR_MS);
    const h = Math.floor(abs / HOUR_MS);
    const m = Math.floor((abs % HOUR_MS) / 60000);
    const s = Math.floor((abs % 60000) / 1000);
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }

  function formatTimer(ms, forceHours) {
    if (ms == null || Number.isNaN(ms)) return '--:--';
    const neg = ms < 0;
    const abs = Math.abs(ms);
    const h = Math.floor(abs / HOUR_MS);
    const m = Math.floor((abs % HOUR_MS) / 60000);
    const s = Math.floor((abs % 60000) / 1000);
    const sign = neg ? '-' : '';
    if (forceHours || h > 0) return `${sign}${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    return `${sign}${pad2(m)}:${pad2(s)}`;
  }

  function formatStartEnd(ev) {
    if (!ev) return '';
    const s = formatClock(ev.timeStart);
    const e = formatClock(ev.timeEnd);
    const cue = ev.cue ? `Q${ev.cue}` : '';
    return [cue, `${s} → ${e}`].filter(Boolean).join('   ');
  }

  // --- render ------------------------------------------------------------
  function render() {
    // wall clock — interpolate locally
    const now = Date.now();
    const drift = now - state.lastPatchAt;
    const liveClock = state.clock != null ? state.clock + drift : null;
    el.clock.textContent = formatClock(liveClock);

    // timer
    const t = state.timer;
    if (!t) {
      el.timer.textContent = '--:--';
      el.timer.className = 'stopped';
      el.timerState.textContent = '';
      el.progressFill.style.width = '0%';
      el.progressPanel.className = '';
      return;
    }

    // interpolate timer when playing
    let current = t.current;
    if (t.playback === 'play' && current != null) {
      // count-down: subtract drift; count-up: add drift. Phase 'overtime' is still counting down (more negative)
      current = current - drift;
    }

    const forceHours = (t.duration || 0) >= HOUR_MS || Math.abs(current || 0) >= HOUR_MS;
    el.timer.textContent = formatTimer(current, forceHours);

    // phase / playback classes
    let cls = 'default';
    if (t.playback === 'pause') cls = 'paused';
    else if (t.playback === 'stop' || t.playback === 'armed') cls = 'stopped';
    else if (t.phase === 'overtime') cls = 'overtime';
    else if (t.phase === 'danger') cls = 'danger';
    else if (t.phase === 'warning') cls = 'warning';
    el.timer.className = cls;

    // playback label top-right
    const stateLabel = {
      play: '', pause: 'Paused', stop: 'Stopped', armed: 'Armed', roll: 'Roll',
    }[t.playback] || '';
    el.timerState.textContent = stateLabel;

    // progress bar
    if (t.duration && t.duration > 0 && t.phase !== 'overtime') {
      const elapsed = (t.duration - Math.max(current, 0));
      const pct = Math.max(0, Math.min(100, (elapsed / t.duration) * 100));
      el.progressFill.style.width = pct + '%';
    } else if (t.phase === 'overtime') {
      el.progressFill.style.width = '100%';
    } else {
      el.progressFill.style.width = '0%';
    }
    el.progressPanel.className = (t.phase === 'warning' || t.phase === 'danger' || t.phase === 'overtime') ? t.phase : '';
  }

  function renderEvents() {
    if (state.eventNow) {
      el.nowTitle.textContent = state.eventNow.title || '—';
      el.nowMeta.textContent = formatStartEnd(state.eventNow);
    } else {
      el.nowTitle.textContent = '—';
      el.nowMeta.textContent = '';
    }
    if (state.eventNext) {
      el.nextTitle.textContent = state.eventNext.title || '—';
      el.nextMeta.textContent = formatStartEnd(state.eventNext);
    } else {
      el.nextTitle.textContent = '—';
      el.nextMeta.textContent = '';
    }
  }

  function renderMessage() {
    const m = state.message && state.message.timer;
    if (!m) { el.overlay.className = ''; return; }
    if (m.blackout) {
      el.overlay.className = 'visible blackout';
      el.overlayMsg.textContent = '';
      return;
    }
    if (m.visible && m.text) {
      el.overlay.className = 'visible';
      el.overlayMsg.textContent = m.text;
      return;
    }
    el.overlay.className = '';
  }

  // --- local tick --------------------------------------------------------
  // keep seconds fresh between WS patches (Pi-friendly: 1 Hz, single DOM write)
  setInterval(render, 500);

  // --- websocket ---------------------------------------------------------
  let ws = null;
  let reconnectTimer = null;
  let staleTimer = null;

  function markFresh() {
    el.conn.classList.remove('stale');
    state.lastPatchAt = Date.now();
    clearTimeout(staleTimer);
    staleTimer = setTimeout(() => el.conn.classList.add('stale'), 5000);
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}/ws`;
    try { ws = new WebSocket(url); } catch (e) { scheduleReconnect(); return; }

    ws.onopen = () => {
      el.conn.classList.remove('stale');
      markFresh();
    };
    ws.onclose = () => { el.conn.classList.add('stale'); scheduleReconnect(); };
    ws.onerror = () => { /* onclose will fire */ };
    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch (e) { return; }
      if (msg && msg.tag === 'runtime-data' && msg.payload) {
        markFresh();
        applyPatch(msg.payload);
      }
    };
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 1500);
  }

  function applyPatch(p) {
    if ('clock' in p) state.clock = p.clock;
    if ('timer' in p) state.timer = p.timer;
    if ('message' in p) state.message = p.message;
    if ('eventNow' in p) state.eventNow = p.eventNow;
    if ('eventNext' in p) state.eventNext = p.eventNext;
    // render what changed
    render();
    if ('eventNow' in p || 'eventNext' in p) renderEvents();
    if ('message' in p) renderMessage();
  }

  // kick things off
  connect();
  // also do an initial REST poll so we render before the first WS frame arrives
  fetch('/api/poll').then(r => r.ok ? r.json() : null).then(j => {
    if (j && j.payload) { markFresh(); applyPatch(j.payload); renderEvents(); renderMessage(); }
  }).catch(() => {});
})();
</script>
</body>
</html>
